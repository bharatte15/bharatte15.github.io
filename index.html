<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharatte N — Data Analyst & BI Developer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d11;
    --bg2: #111318;
    --bg3: #181b22;
    --surface: #1e222b;
    --surface2: #252a35;
    --accent: #00d4a1;
    --accent2: #00a87f;
    --accent-dim: rgba(0,212,161,0.1);
    --accent-dim2: rgba(0,212,161,0.05);
    --text: #f0f0ee;
    --text2: #9ba3b2;
    --text3: #5f6672;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --gold: #f5c84a;
    --gold-dim: rgba(245,200,74,0.12);
    --blue: #4a9eff;
    --blue-dim: rgba(74,158,255,0.1);
    --coral: #ff6b6b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ---- NAV ---- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 4rem;
    background: rgba(11,13,17,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links a {
    text-decoration: none; color: var(--text2);
    font-size: 0.875rem; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ---- HERO ---- */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 8rem 4rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,161,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,161,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
  }
  .hero-glow {
    position: absolute; top: 10%; right: 5%;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,161,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-content { position: relative; max-width: 900px; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 0.6rem;
    background: var(--accent-dim); border: 1px solid rgba(0,212,161,0.25);
    border-radius: 2rem; padding: 0.4rem 1rem;
    font-size: 0.8rem; font-weight: 500; color: var(--accent);
    letter-spacing: 0.05em; text-transform: uppercase;
    margin-bottom: 2rem;
  }
  .hero-eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  h1.hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  h1.hero-name span { color: var(--accent); font-style: italic; }
  .hero-title {
    font-size: clamp(1rem, 2vw, 1.3rem);
    color: var(--text2);
    font-weight: 300;
    letter-spacing: 0.01em;
    margin-bottom: 2rem;
  }
  .hero-desc {
    max-width: 580px;
    color: var(--text2);
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 3rem;
  }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--accent); color: #000;
    padding: 0.85rem 2rem; border-radius: 0.5rem;
    text-decoration: none; font-weight: 600; font-size: 0.9rem;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: #00f0b8; transform: translateY(-1px); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2);
    padding: 0.85rem 2rem; border-radius: 0.5rem;
    text-decoration: none; font-weight: 500; font-size: 0.9rem;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .hero-stats {
    display: flex; gap: 3rem; margin-top: 4rem;
    padding-top: 3rem; border-top: 1px solid var(--border);
